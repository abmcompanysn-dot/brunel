du et coe<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration Mahu - Cartes & Ventes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #050505; padding-top: 50px; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .admin-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        h1 { color: var(--blue); margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #1a1a1a; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--blue); }
        .stat-box span { display: block; font-size: 2em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        th { color: #888; text-transform: uppercase; font-size: 0.8em; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-Vierge { background: #333; color: #aaa; }
        .status-Vendu { background: #007bff22; color: var(--blue); }
        .status-Active { background: #28a74522; color: #28a745; }
        .form-inline { display: flex; gap: 10px; align-items: flex-end; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Mahu Control Panel</h1>

        <!-- Génération de codes -->
        <div class="admin-card">
            <h3>Générer des nouveaux codes (Stock vierge)</h3>
            <div class="form-inline">
                <div class="form-group">
                    <label>Préfixe</label>
                    <input type="text" id="gen-prefix" class="form-control" value="MH" style="width: 80px;">
                </div>
                <div class="form-group">
                    <label>Quantité</label>
                    <input type="number" id="gen-qty" class="form-control" value="10" style="width: 100px;">
                </div>
                <button class="btn btn-primary" onclick="generateCodes()" style="width: auto;">Générer les Cartes</button>
            </div>
        </div>

        <!-- Stats rapides -->
        <div class="stats-row">
            <div class="stat-box">Statut Vierge<span id="stat-vierge">-</span></div>
            <div class="stat-box">Statut Vendu<span id="stat-vendu">-</span></div>
            <div class="stat-box">Statut Activé<span id="stat-active">-</span></div>
        </div>

        <!-- Liste des cartes -->
        <div class="admin-card">
            <h3>Gestion du Stock & Suivi Revente</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Code Carte</th>
                            <th>Statut</th>
                            <th>Vendeur / Revendeur</th>
                            <th>Propriétaire</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cards-table-body">
                        <tr><td colspan="5">Chargement du stock...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function callAdminApi(action, data = {}) {
            const formData = new FormData();
            formData.append('action', action);
            formData.append('token', localStorage.getItem('authToken'));
            formData.append('payload', JSON.stringify(data));
            return fetch(API_URL, { method: 'POST', body: formData }).then(res => res.json());
        }

        function loadDashboard() {
            callAdminApi('adminGetCardsData').then(res => {
                if (!res.success) return alert(res.error);
                renderTable(res.cards);
                updateStats(res.cards);
            });
        }

        function renderTable(cards) {
            const body = document.getElementById('cards-table-body');
            body.innerHTML = '';
            cards.reverse().forEach(card => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-family: monospace; font-weight: bold;">${card.Code_Carte}</td>
                    <td><span class="status-badge status-${card.Statut}">${card.Statut}</span></td>
                    <td>${card.Vendeur || '-'}</td>
                    <td>${card.Email_Proprietaire || '<em style="color:#555">Aucun</em>'}</td>
                    <td>
                        ${card.Statut === 'Vierge' ? 
                            `<button onclick="markAsSold('${card.Code_Carte}')" class="btn btn-secondary" style="padding:5px 10px; font-size:0.8em;">Marquer Vendu</button>` : 
                            `<span style="color:#444">Verrouillé</span>`}
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function updateStats(cards) {
            document.getElementById('stat-vierge').textContent = cards.filter(c => c.Statut === 'Vierge').length;
            document.getElementById('stat-vendu').textContent = cards.filter(c => c.Statut === 'Vendu').length;
            document.getElementById('stat-active').textContent = cards.filter(c => c.Statut === 'Active').length;
        }

        function generateCodes() {
            const prefix = document.getElementById('gen-prefix').value;
            const quantity = document.getElementById('gen-qty').value;
            if(!confirm(`Générer ${quantity} nouveaux codes ?`)) return;
            
            callAdminApi('adminGenerateCardCodes', { prefix, quantity }).then(res => {
                alert(res.message);
                loadDashboard();
            });
        }

        function markAsSold(code) {
            const vendeur = prompt("Nom du vendeur ou revendeur (ex: Boutique Dakar, Agent X) :");
            if (!vendeur) return;
            const note = prompt("Commentaire optionnel :");
            
            callAdminApi('adminUpdateCardSale', { code, vendeur, commentaire: note }).then(res => {
                if(res.success) {
                    alert("Vente enregistrée !");
                    loadDashboard();
                }
            });
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
