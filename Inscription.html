<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Créez votre compte Mahu.">
    <meta name="robots" content="noindex, nofollow"> <!-- Page volontairement non référencée : accessible uniquement via lien direct -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscription - Mahu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles pour la barre de navigation transparente (copiés de Connexion.html) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s ease;
        }
        #login-link .profile-icon {
            stroke: var(--text-primary);
            width: 28px;
            height: 28px;
            transition: stroke 0.3s ease;
        }
        #login-link {
            background: transparent;
            border: none;
            stroke: var(--text-primary);
        }
        .more-menu-container { position: relative; }
        .more-menu-icon { cursor: pointer; padding: 5px; }
        .more-menu-icon svg { stroke: var(--text-primary); width: 28px; height: 28px; }
        .more-menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 10px;
            min-width: 160px;
            z-index: 1001;
            border: 1px solid #333;
            transform: translateY(10px);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.2s ease, opacity 0.2s ease, visibility 0.2s;
        }
        .more-menu-dropdown.visible { transform: translateY(0); opacity: 1; visibility: visible; }
        .more-menu-dropdown a { display: block; color: white; padding: 10px 15px; border-radius: 5px; transition: background-color 0.2s ease; }
        .more-menu-dropdown a:hover { background-color: rgba(255, 255, 255, 0.1); }
        .desktop-links { display: none; }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
            align-items: center;
        }
        .auth-image-side {
            display: none;
            background: url('r/co.svg') no-repeat center center;
            background-size: cover;
            height: 100vh;
        }
        .auth-form-side {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        @media (min-width: 992px) {
            .auth-container { grid-template-columns: 1fr 1fr; }
            .auth-image-side { display: block; }
            .auth-form-side { padding: 40px; }
        }
        .auth-card {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .auth-card h1 { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .password-group { position: relative; }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(50%);
            cursor: pointer;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
            font-size: 1em;
            box-sizing: border-box;
        }
        .toggle-form { text-align: center; margin-top: 25px; color: var(--text-secondary); }
        .toggle-form a { color: var(--blue); cursor: pointer; font-weight: bold; }

        @media (max-width: 991px) {
            nav ul.desktop-links { display: none; }
        }
    </style>
</head>
<body>
    <div id="auth-page-wrapper" style="opacity: 0; transition: opacity 0.3s ease;">
    <header>
        <nav class="container">
            <a href="index.html" class="logo"><img src="r/logo.png" alt="Logo Mahu" style="height: 50px;"></a>
            <ul class="desktop-links">
                <li><a href="index.html#features">Technologie</a></li>
                <li><a href="index.html#about">À Propos</a></li>
            </ul>
            <div class="nav-actions">
                <a href="Connexion.html" class="primary" id="login-link">
                    <svg class="profile-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
                <div class="more-menu-container">
                    <div class="more-menu-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg></div>
                    <div class="more-menu-dropdown">
                        <a href="index.html#features">Technologie</a>
                        <a href="index.html#about">À Propos</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-image-side"></div>
            <div class="auth-form-side">
                <div class="auth-card">
                    <form id="register-form" onsubmit="handleRegister(event)">
                        <h1 id="register-title">Créer un compte</h1>
                        <input type="hidden" id="enterprise-id" value="">
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" class="form-control" required>
                        </div>
                        <div class="form-group password-group">
                            <label for="register-password">Mot de passe</label>
                            <input type="password" id="register-password" class="form-control" required>
                            <svg onclick="togglePasswordVisibility('register-password', this)" class="password-toggle" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                        <div class="form-group" id="is-enterprise-group">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="checkbox" id="is-enterprise" onchange="toggleEnterpriseFields()">
                                Créer un compte Entreprise
                            </label>
                        </div>
                        <div id="enterprise-fields" style="display: none; padding-left: 15px; border-left: 2px solid var(--border-color);">
                            <div class="form-group">
                                <label for="register-enterprise-name">Nom de l'entreprise</label>
                                <input type="text" id="register-enterprise-name" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="register-enterprise-phone">Téléphone</label>
                                <input type="tel" id="register-enterprise-phone" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="register-enterprise-address">Adresse</label>
                                <input type="text" id="register-enterprise-address" class="form-control">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gradient">Créer un compte</button>
                        <p class="toggle-form">Déjà un compte ? <a href="Connexion.html">Connectez-vous</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>
    </div>

    <script src="config.js"></script>

    <script>
        function callApi(action, data = {}) {
            const formData = new FormData();
            formData.append('action', action);
            for (const key in data) {
                const value = typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key];
                formData.append(key, value);
            }
            return fetch(API_URL, { method: 'POST', body: formData }).then(res => res.json());
        }

        function toggleEnterpriseFields() {
            const isEnterprise = document.getElementById('is-enterprise').checked;
            document.getElementById('enterprise-fields').style.display = isEnterprise ? 'block' : 'none';
        }

        function togglePasswordVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07l-5.52 5.52"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function showError(formId, message) {
            const form = document.getElementById(formId);
            let errorDiv = document.getElementById('error-message');
            if (!errorDiv) {
                errorDiv = document.createElement('p');
                errorDiv.id = 'error-message';
                errorDiv.style.color = 'var(--red)';
                errorDiv.style.textAlign = 'center';
                form.insertBefore(errorDiv, form.querySelector('.toggle-form'));
            }
            errorDiv.textContent = message;
        }

        function handleRegister(event) {
            event.preventDefault();
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const enterpriseId = document.getElementById('enterprise-id').value;
            const button = event.target.querySelector('button');
            button.disabled = true;
            button.textContent = 'Chargement...';

            const payload = { email, password, enterpriseId };

            if (document.getElementById('is-enterprise').checked) {
                payload.isEnterprise = true;
                payload.enterpriseName = document.getElementById('register-enterprise-name').value;
                payload.enterprisePhone = document.getElementById('register-enterprise-phone').value;
                payload.enterpriseAddress = document.getElementById('register-enterprise-address').value;
            }

            callApi('registerUser', { payload: payload })
                .then(response => {
                    if (response.success) {
                        localStorage.setItem('authToken', response.token);
                        localStorage.setItem('userIsLoggedIn', 'true');
                        window.location.href = 'Onboarding.html';
                    } else {
                        showError('register-form', response.error || 'Une erreur est survenue.');
                        button.disabled = false;
                        button.textContent = 'Créer un compte';
                    }
                })
                .catch(() => {
                    showError('register-form', 'Erreur de communication avec le serveur.');
                    button.disabled = false;
                    button.textContent = 'Créer un compte';
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-page-wrapper').style.opacity = '1';

            const moreMenuIcon = document.querySelector('.more-menu-icon');
            if (moreMenuIcon) {
                moreMenuIcon.addEventListener('click', (event) => {
                    event.stopPropagation();
                    document.querySelector('.more-menu-dropdown').classList.toggle('visible');
                });
            }
            document.addEventListener('click', function(event) {
                const dropdown = document.querySelector('.more-menu-dropdown');
                const menuContainer = document.querySelector('.more-menu-container');
                if (dropdown && dropdown.classList.contains('visible') && !menuContainer.contains(event.target)) {
                    dropdown.classList.remove('visible');
                }
            });

            // Lien d'invitation d'équipe : Inscription.html?enterprise_id=...
            const urlParams = new URLSearchParams(window.location.search);
            const enterpriseIdParam = urlParams.get('enterprise_id');
            if (enterpriseIdParam) {
                document.getElementById('enterprise-id').value = enterpriseIdParam;
                document.getElementById('register-title').textContent = "Rejoindre l'équipe";
                // Un compte créé via un lien d'invitation rejoint une entreprise existante :
                // on masque l'option "Créer un compte Entreprise" pour éviter toute confusion.
                document.getElementById('is-enterprise-group').style.display = 'none';
            }

            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById('register-email').value = emailParam;
            }
        });
    </script>
</body>
</html>
